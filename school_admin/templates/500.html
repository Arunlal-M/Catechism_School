{% extends "base.html" %}

{% block title %}Server Error — {{ school_name }}{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="text-center">
        <h1 class="text-9xl font-bold text-gray-200">500</h1>
        <h2 class="text-3xl font-bold text-gray-900 mt-4">Internal Server Error</h2>
        <p class="mt-4 text-gray-600 max-w-md mx-auto">
            Something went wrong on our end. We've logged the error and our team will look into it.
        </p>
        <div class="mt-8">
            <a href="/" class="px-6 py-3 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition-colors">
                Return to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
