{% extends "base.html" %}

{% block title %}Page Not Found — {{ school_name }}{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="text-center">
        <h1 class="text-9xl font-bold text-gray-200">404</h1>
        <h2 class="text-3xl font-bold text-gray-900 mt-4">Page Not Found</h2>
        <p class="mt-4 text-gray-600 max-w-md mx-auto">
            The page you are looking for doesn't exist or has been moved.
        </p>
        <div class="mt-8">
            <a href="/" class="px-6 py-3 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition-colors">
                Return Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
